<!DOCTYPE html>
<html lang="zh-CN" data-theme="auto">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>字幕翻译工作台</title>
    <meta name="description" content="下载视频、识别原文字幕、翻译并烧录到视频的处理工作台" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
  </head>
  <body>
    <header class="app-header">
      <div class="app-header__brand">
        <span class="app-header__mark" aria-hidden="true"><i class="ph ph-translate"></i></span>
        <div>
          <h1 class="app-header__title">字幕翻译工作台</h1>
          <p class="app-header__sub">下载 · 识别 · 翻译 · 烧录，一条流水线跑完</p>
        </div>
      </div>
      <div class="app-header__actions">
        <span class="env-pill" id="envPill" title="数据来源"></span>
        <button class="icon-btn" id="themeToggle" type="button" aria-label="切换深色 / 浅色">
          <i class="ph ph-moon" aria-hidden="true"></i>
        </button>
      </div>
    </header>

    <main class="layout">
      <!-- 新建任务 -->
      <section class="composer" aria-labelledby="composerTitle">
        <h2 class="section-title" id="composerTitle">新建任务</h2>
        <form id="taskForm" class="form" novalidate>
          <div class="field">
            <label class="field__label" for="url">视频链接</label>
            <input
              class="input"
              id="url"
              name="url"
              type="url"
              inputmode="url"
              placeholder="粘贴视频页面地址"
              autocomplete="off"
              required
            />
            <p class="field__hint" id="urlHint">支持单个视频页面地址</p>
          </div>

          <div class="field-row">
            <div class="field">
              <label class="field__label" for="sourceLang">源语言</label>
              <select class="input" id="sourceLang" name="sourceLang">
                <option value="auto" selected>自动检测</option>
                <option value="en">英语</option>
                <option value="ja">日语</option>
                <option value="ko">韩语</option>
                <option value="zh">中文</option>
              </select>
            </div>
            <div class="field">
              <label class="field__label" for="targetLang">目标语言</label>
              <select class="input" id="targetLang" name="targetLang">
                <option value="zh-CN" selected>简体中文</option>
                <option value="zh-TW">繁体中文</option>
                <option value="en">英语</option>
                <option value="ja">日语</option>
                <option value="ko">韩语</option>
              </select>
            </div>
          </div>

          <fieldset class="field">
            <legend class="field__label">字幕模式</legend>
            <div class="segmented" role="radiogroup" aria-label="字幕模式">
              <label class="segmented__opt">
                <input type="radio" name="mode" value="mono" checked />
                <span>仅译文</span>
              </label>
              <label class="segmented__opt">
                <input type="radio" name="mode" value="bilingual" />
                <span>双语对照</span>
              </label>
            </div>
          </fieldset>

          <fieldset class="field">
            <legend class="field__label">烧录方式</legend>
            <div class="choice-cards" role="radiogroup" aria-label="烧录方式">
              <label class="choice-card">
                <input type="radio" name="burn" value="hard" checked />
                <span class="choice-card__body">
                  <span class="choice-card__name">硬烧录</span>
                  <span class="choice-card__desc">字幕嵌入画面，不可关闭</span>
                </span>
              </label>
              <label class="choice-card">
                <input type="radio" name="burn" value="soft" />
                <span class="choice-card__body">
                  <span class="choice-card__name">软字幕</span>
                  <span class="choice-card__desc">随视频内嵌，可开关</span>
                </span>
              </label>
            </div>
          </fieldset>

          <div class="field-row">
            <div class="field">
              <label class="field__label" for="model">Whisper 模型</label>
              <select class="input" id="model" name="model">
                <option value="tiny">tiny · 最快</option>
                <option value="base">base · 快</option>
                <option value="small" selected>small · 推荐</option>
                <option value="medium">medium · 较准</option>
                <option value="large-v3">large-v3 · 最准</option>
              </select>
              <p class="field__hint">模型越大越准，但更慢、更吃算力</p>
            </div>
            <div class="field">
              <label class="field__label" for="engine">翻译引擎</label>
              <select class="input" id="engine" name="engine"></select>
              <p class="field__hint">当前仅支持 DeepSeek，后续扩展</p>
            </div>
          </div>

          <button class="btn btn--primary btn--block" type="submit" id="submitBtn">
            <i class="ph ph-play" aria-hidden="true"></i>
            <span>开始处理</span>
          </button>
        </form>
      </section>

      <!-- 任务列表 -->
      <section class="tasks" aria-labelledby="tasksTitle">
        <div class="tasks__head">
          <h2 class="section-title" id="tasksTitle">任务列表</h2>
          <div class="tasks__filters" id="filters" role="tablist" aria-label="按状态筛选">
            <button class="chip is-active" data-filter="all" role="tab">全部</button>
            <button class="chip" data-filter="active" role="tab">进行中</button>
            <button class="chip" data-filter="done" role="tab">已完成</button>
            <button class="chip" data-filter="failed" role="tab">失败</button>
          </div>
        </div>
        <div class="task-list" id="taskList" aria-live="polite"></div>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
