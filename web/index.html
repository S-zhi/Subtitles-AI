<!DOCTYPE html>
<html lang="zh-CN" data-theme="auto">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subtitles AI</title>
    <meta name="description" content="本地视频字幕处理台：下载、识别、翻译、烧录，一站式产出带字幕成品" />
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/layout.css" />
    <link rel="stylesheet" href="styles/console.css" />
    <link rel="stylesheet" href="styles/queue.css" />
    <link rel="stylesheet" href="styles/preview.css" />
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
  </head>
  <body>
    <div class="container" aria-hidden="true"></div>
    <div class="app">
      <!-- 侧边工具栏 -->
      <aside class="sidebar">
        <div class="brand">
          <span class="brand__mark" aria-hidden="true"><i class="ph ph-subtitles"></i></span>
          <span class="brand__name">Subtitles AI</span>
        </div>

        <nav class="nav" id="nav" aria-label="功能导航">
          <button class="nav__item is-active" type="button" data-view="tasks">
            <i class="ph ph-rows" aria-hidden="true"></i><span>任务</span>
          </button>
          <button class="nav__item" type="button" data-view="preview">
            <i class="ph ph-monitor-play" aria-hidden="true"></i><span>视频预览</span>
          </button>
        </nav>

        <div class="sidebar__spacer"></div>

        <div class="sidebar__foot">
          <button class="iconbtn" id="themeToggle" type="button" aria-label="切换深色 / 浅色">
            <i class="ph ph-moon" aria-hidden="true"></i>
          </button>
        </div>
      </aside>

      <!-- 内容区 -->
      <main class="content">
        <!-- ============ 任务 ============ -->
        <section class="view is-active" data-view="tasks" id="view-tasks">
          <!-- 任务控制台 -->
          <form class="console" id="taskForm" novalidate>
            <div class="console__bar" id="consoleBar">
              <span class="console__icon" aria-hidden="true"><i class="ph ph-link-simple"></i></span>
              <input
                class="console__input"
                id="url"
                name="url"
                type="url"
                inputmode="url"
                autocomplete="off"
                aria-label="视频链接"
                placeholder="粘贴视频页面地址"
                required
              />
              <button class="btn btn--primary console__go" type="submit" id="submitBtn">
                <i class="ph ph-play" aria-hidden="true"></i><span>开始处理</span>
              </button>
            </div>
            <p class="console__hint" id="urlHint">粘贴单个视频页面地址，回车或点击开始处理</p>

            <div class="params">
              <div class="param">
                <span class="param__label">源语言</span>
                <select class="select" id="sourceLang" name="sourceLang" aria-label="源语言">
                  <option value="auto" selected>自动检测</option>
                  <option value="en">英语</option>
                  <option value="ja">日语</option>
                  <option value="ko">韩语</option>
                  <option value="zh">中文</option>
                </select>
              </div>
              <div class="param">
                <span class="param__label">目标语言</span>
                <select class="select" id="targetLang" name="targetLang" aria-label="目标语言">
                  <option value="zh-CN" selected>简体中文</option>
                  <option value="zh-TW">繁体中文</option>
                  <option value="en">英语</option>
                  <option value="ja">日语</option>
                  <option value="ko">韩语</option>
                </select>
              </div>
              <fieldset class="param" style="border:0;margin:0;padding:0">
                <span class="param__label">字幕模式</span>
                <div class="segmented" role="radiogroup" aria-label="字幕模式">
                  <label class="segmented__opt"><input type="radio" name="mode" value="mono" checked /><span>仅译文</span></label>
                  <label class="segmented__opt"><input type="radio" name="mode" value="bilingual" /><span>双语</span></label>
                </div>
              </fieldset>
              <fieldset class="param" style="border:0;margin:0;padding:0">
                <span class="param__label">烧录方式</span>
                <div class="segmented" role="radiogroup" aria-label="烧录方式">
                  <label class="segmented__opt"><input type="radio" name="burn" value="hard" checked /><span>硬烧录</span></label>
                  <label class="segmented__opt"><input type="radio" name="burn" value="soft" /><span>软字幕</span></label>
                </div>
              </fieldset>
              <div class="param">
                <span class="param__label">模型</span>
                <select class="select" id="model" name="model" aria-label="Whisper 模型">
                  <option value="tiny">tiny · 最快</option>
                  <option value="base">base · 快</option>
                  <option value="small" selected>small · 推荐</option>
                  <option value="medium">medium · 较准</option>
                  <option value="large-v3">large-v3 · 最准</option>
                </select>
              </div>
              <div class="param">
                <span class="param__label">翻译引擎</span>
                <select class="select" id="engine" name="engine" aria-label="翻译引擎"></select>
              </div>
            </div>
          </form>

          <!-- 处理队列 -->
          <section class="queue">
            <div class="queue__head">
              <h2>处理队列</h2>
              <div class="filters" id="filters" role="tablist" aria-label="按状态筛选">
                <button class="chip is-active" data-filter="all" role="tab">全部</button>
                <button class="chip" data-filter="active" role="tab">进行中</button>
                <button class="chip" data-filter="done" role="tab">已完成</button>
                <button class="chip" data-filter="failed" role="tab">失败</button>
              </div>
            </div>
            <div class="queue__list" id="taskList" aria-live="polite"></div>
          </section>
        </section>

        <!-- ============ 预览 ============ -->
        <section class="view" data-view="preview" id="view-preview">
          <div class="screening">
            <div class="screening__stage" id="previewStage"></div>
            <aside class="screening__rail">
              <h2>已完成</h2>
              <div class="screening__list" id="previewList"></div>
            </aside>
          </div>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

    <script src="config.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
